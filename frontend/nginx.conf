# Maps the Upgrade header so both WebSocket and long-polling transports work
# correctly through the proxy.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA: serve index.html for any client-side route.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Reverse-proxy Socket.IO (HTTP handshake + WebSocket upgrade) to the backend.
  location /socket.io/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400; # keep long-lived sockets open
  }

  # Expose the backend health check through the same origin.
  location /health {
    proxy_pass http://backend:4000/health;
  }
}
