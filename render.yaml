# Render Blueprint — deploys the whole app as ONE service at a single URL.
#
# In Render:  New +  ->  Blueprint  ->  connect this repository.
#
# The build compiles the React frontend, and the Node backend serves that
# static build alongside the Socket.IO API. Frontend connects to the same
# origin (VITE_BACKEND_URL=""), so there's no cross-service wiring.
#
# Single free instance uses the in-memory adapter. To scale horizontally,
# add a Redis instance and set REDIS_URL on the service.

services:
  - type: web
    name: collab-editor
    runtime: node
    rootDir: backend
    plan: free
    region: singapore
    # Install backend deps, then build the frontend into frontend/dist.
    buildCommand: npm ci && cd ../frontend && npm ci && npm run build
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: "*"
      # No VITE_BACKEND_URL needed: a production build connects to the same
      # origin automatically (see frontend/src/socket.js).
